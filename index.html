<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Cabala Dice</title>

<script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#1e1e1e;
color:white;
padding:10px;
}

h2{
margin-top:0;
}

.controls{
margin-bottom:10px;
}

button{
background:#444;
border:none;
color:white;
padding:6px 10px;
margin:3px;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#666;
}

input[type=radio]{
margin-left:6px;
}

#dice{
margin-top:10px;
}

#result{
margin-top:10px;
padding:8px;
background:#333;
border-radius:4px;
}

.success{
color:#4caf50;
font-weight:bold;
}

.fail{
color:#888;
}

</style>

</head>

<body>

<h2>Cabala Dice</h2>

<div class="controls">

Quantidade:

<button onclick="changeDice(-1)">-</button>

<span id="qty">2</span>

<button onclick="changeDice(1)">+</button>

</div>

<div class="controls">

Modo:

<label>
<input type="radio" name="mode" value="normal" checked>
Normal
</label>

<label>
<input type="radio" name="mode" value="adv">
Vantagem
</label>

<label>
<input type="radio" name="mode" value="dis">
Desvantagem
</label>

</div>

<div id="dice">

<button onclick="rollD2()">1d2</button>

<button onclick="rollD3()">1d3</button>

<button onclick="rollD6()">1d6</button>

<button onclick="rollD66()">1d66</button>

</div>

<div id="result">

Resultado aparecerá aqui

</div>

<script src="main.js"></script>

</body>

</html>
