<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cabala Dice</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Cabala Dice</h1>

      <section class="controls">
        <div class="row">
          <button data-type="d66">d66</button>
          <button data-type="d6" class="active">d6</button>
        </div>

        <div class="row">
          <button id="decrease" aria-label="diminuir dados">&lt;</button>
          <output id="dice-count">1</output>
          <button id="increase" aria-label="aumentar dados">&gt;</button>
        </div>

        <div class="row">
          <button data-mode="adv">adv</button>
          <button data-mode="des">des</button>
        </div>

        <button id="roll" class="roll">rolar</button>
      </section>

      <section class="result" id="result">
        <h2>Sua última rolagem</h2>
        <p>Aguardando rolagem...</p>
      </section>

      <section class="history">
        <h2>Últimas rolagens da mesa</h2>
        <ul id="history-list">
          <li>Nenhuma rolagem registrada.</li>
        </ul>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
