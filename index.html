<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cabala Dice</title>

<style>

body{
font-family:sans-serif;
padding:10px;
}

button{
width:100%;
margin:4px 0;
padding:10px;
font-size:14px;
}

#pool{
margin-top:10px;
font-weight:bold;
}

#resultado{
margin-top:10px;
}

</style>

</head>

<body>

<h3>Cabala Dice</h3>

<h4>Adicionar Dados</h4>

<button onclick="addDie('d2')">d2</button>
<button onclick="addDie('d3')">d3</button>
<button onclick="addDie('d66')">d66</button>
<button onclick="addDie('d6')">d6</button>

<div id="pool">
Nenhum dado selecionado
</div>

<hr>

<h4>Rolar</h4>

<button onclick="roll('desvantagem')">Desvantagem</button>
<button onclick="roll('normal')">Normal</button>
<button onclick="roll('vantagem')">Vantagem</button>

<hr>

<button onclick="clearDice()">Limpar</button>

<div id="resultado"></div>

<script src="script.js"></script>

</body>
</html>
